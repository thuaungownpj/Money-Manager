<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Manager - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="project-title">Money Manager</h1>
            
            <h2 id="form-title">Welcome Back</h2>
            <p id="form-subtitle">Login to manage your finances</p>
            
            <form id="auth-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <!-- Save Password (Remember me) -->
                <div class="remember-me" id="remember-me-container">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary">Login</button>
            </form>
            
            <div class="auth-switch">
                <span id="switch-text">Don't have an account?</span>
                <a href="#" id="switch-btn">Sign Up</a>
            </div>
            <div id="error-message" class="error"></div>
        </div>
    </div>
    
    <script type="module" src="js/auth.js"></script>
</body>
</html>
