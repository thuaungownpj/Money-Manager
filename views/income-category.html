<section class="widget-card" style="margin-bottom: 20px;">
    <div class="section-header">
        <h3>Create New Income Category</h3>
    </div>
    <form id="income-category-form">
        <div class="form-row" style="grid-template-columns: 120px 1fr auto;">
            <div class="input-group">
                <label>Icon</label>
                <select id="inc-cat-icon" required style="font-size: 16px; cursor: pointer;">
                    <option value="👨‍💻" data-i18n="cat_inc_dev">👨‍💻 Developer</option>
                    <option value="📺" data-i18n="cat_inc_yt">📺 YouTube</option>
                    <option value="📘" data-i18n="cat_inc_fb">📘 Facebook</option>
                    <option value="🛂" data-i18n="cat_inc_pass">🛂 Passport</option>
                    <option value="🔑" data-i18n="cat_inc_vpn">🔑 VPN Key</option>
                    <option value="📱" data-i18n="cat_inc_app">📱 Applications</option>
                    <option value="🌐" data-i18n="cat_inc_web">🌐 Website</option>
                    <option value="📢" data-i18n="cat_inc_admob">📢 Admob</option>
                    <option value="💵" data-i18n="cat_inc_adsense">💵 Adsense</option>
                    <option value="💼" data-i18n="cat_inc_freelance">💼 Freelance</option>
                    <option value="🧩" data-i18n="cat_inc_other">🧩 Others</option>
                </select>
            </div>
            <div class="input-group">
                <label>Category Name</label>
                <input type="text" id="inc-cat-name" required placeholder="e.g. YouTube Revenue">
            </div>
            <div class="input-group" style="display: flex; align-items: flex-end;">
                <button type="submit" class="btn-primary" style="padding: 14px 20px;">Add</button>
            </div>
        </div>
    </form>
</section>

<section class="widget-card">
    <div class="section-header">
        <h3>Your Income Categories</h3>
    </div>
    <div class="category-list" id="income-category-list">
        <!-- Data များ ဒီနေရာတွင် ပေါ်လာမည် -->
    </div>
</section>
