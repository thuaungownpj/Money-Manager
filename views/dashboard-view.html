<section class="summary-grid">
    <div class="summary-card income-card">
        <h3>Total Income (ဝင်ငွေ)</h3><p id="card-income" class="amount">0 Ks</p>
    </div>
    <div class="summary-card expense-card">
        <h3>Total Expense (ထွက်ငွေ)</h3><p id="card-expense" class="amount">0 Ks</p>
    </div>
    <div class="summary-card profit-card">
        <h3>Net Profit (အမြတ်ငွေ)</h3><p id="card-profit" class="amount">0 Ks</p>
    </div>
    <div class="summary-card loss-card">
        <h3>Net Loss (အရှုံးငွေ)</h3><p id="card-loss" class="amount">0 Ks</p>
    </div>
</section>
<section class="widget-card">
    <div class="section-header"><h3>Transaction History</h3></div>
    <div class="table-responsive">
        <table class="transaction-table">
            <thead>
                <tr><th>Date</th><th>Category</th><th>Type</th><th>Amount</th><th>Action</th></tr>
            </thead>
            <tbody id="transaction-list">
                <tr><td colspan="5" class="text-center text-muted">Loading transactions...</td></tr>
            </tbody>
        </table>
    </div>
</section>
